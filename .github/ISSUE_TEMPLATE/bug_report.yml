name: Bug Report
description: Report a problem with GideonMail
labels: ["bug"]
body:
  - type: input
    id: os
    attributes:
      label: OS and version
      placeholder: "e.g., Windows 11 Home"
    validations:
      required: true
  - type: input
    id: mail_server
    attributes:
      label: Mail server type
      placeholder: "e.g., ISPConfig, Dovecot, Postfix"
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error messages or logs
      render: text
